name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: composer install --optimize-autoloader
      - run: npm ci
      - run: composer test
      - run: npm run typecheck
      - run: npm run build
