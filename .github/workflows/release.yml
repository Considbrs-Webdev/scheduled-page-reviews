name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Viktigt: Vi behöver hämta hela historiken så att vi kan pusha tillbaka ordentligt
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dev dependencies and verify
        run: |
          composer install --optimize-autoloader
          npm ci
          composer test
          npm run typecheck
          npm run build

      - name: Build release ZIP
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/build-release.mjs

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-page-reviews-${{ github.ref_name }}
          path: .build/scheduled-page-reviews-*.zip

      # --- Packagist-fix ---
      - name: Commit built assets and update Git Tag for Packagist
        run: |
          # 1. Konfigurera en tillfällig git-användare på runnern
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 2. Packa upp din färdiga, rena ZIP över ditt arbetsflöde 
          mkdir -p .tmp_unzip
          unzip -q .build/scheduled-page-reviews-*.zip -d .tmp_unzip
          
          # Töm nuvarande mapp (förutom .git och .build) och flytta in produktionsfilerna
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.build' ! -name '.tmp_unzip' -exec rm -rf {} +
          cp -r .tmp_unzip/scheduled-page-reviews/* .
          rm -rf .tmp_unzip

          # 3. Tvinga git att skita i .gitignore för de kompilerade filerna
          git add -A --force

          # 4. Gör en lokal commit (denna kommer bara leva på taggen)
          git commit -m "Build: Production assets for ${{ github.ref_name }}"

          # 5. Ta bort den gamla lokala taggen och sätt den på vår nya produktions-commit
          git tag -d ${{ github.ref_name }}
          git tag ${{ github.ref_name }}

          # 6. Force-pusha taggen tillbaka till GitHub
          git push origin ${{ github.ref_name }} --force
      # ---------------------

      - name: Create GitHub prerelease with ZIP
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'test') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: .build/scheduled-page-reviews-*.zip
          generate_release_notes: true

  # Deploy to WordPress.org when SVN secrets are configured (plugin must exist on .org).
  deploy-wordpress-org:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.WPORG_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare build directory
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build
          node scripts/build-release.mjs
          rm -rf build
          unzip -q .build/scheduled-page-reviews-*.zip -d build
          mv build/scheduled-page-reviews build/package

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@v2
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        with:
          build-dir: build/package
          generate-zip: true
