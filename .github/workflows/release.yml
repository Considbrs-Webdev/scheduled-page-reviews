name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.evaluate.outputs.should_release }}
      version: ${{ steps.evaluate.outputs.version }}
      tag: ${{ steps.evaluate.outputs.tag }}
      prerelease: ${{ steps.evaluate.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate release
        id: evaluate
        run: |
          VERSION=$(jq -r '.version' package.json)
          TAG="v${VERSION}"
          HEADER_VERSION=$(grep -oP 'Version:\s*\K[0-9.]+(?:-[0-9A-Za-z.-]+)?' scheduled-page-reviews.php)
          CONFIG_VERSION=$(grep -oP "'version'\s*=>\s*'\K[^']+" config/app.php)

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$VERSION" != "$HEADER_VERSION" ] || [ "$VERSION" != "$CONFIG_VERSION" ]; then
            echo "Version mismatch:"
            echo "  package.json: ${VERSION}"
            echo "  plugin header: ${HEADER_VERSION}"
            echo "  config/app.php: ${CONFIG_VERSION}"
            echo "Run: node scripts/sync-version.mjs ${VERSION}"
            exit 1
          fi

          PRERELEASE=false
          case "$VERSION" in
            *test*|*alpha*|*beta*|*rc*) PRERELEASE=true ;;
          esac

          echo "Release ${TAG} will be created."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies and verify
        run: |
          composer install --optimize-autoloader
          npm ci
          composer test
          npm run typecheck
          npm run build

      - name: Build release ZIP
        env:
          RELEASE_VERSION: ${{ needs.check.outputs.version }}
        run: node scripts/build-release.mjs

      - name: Push release branch and tag
        env:
          VERSION: ${{ needs.check.outputs.version }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          mkdir -p .tmp_unzip
          unzip -q .build/scheduled-page-reviews-*.zip -d .tmp_unzip
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.build' ! -name '.tmp_unzip' -exec rm -rf {} +
          cp -r .tmp_unzip/scheduled-page-reviews/* .
          rm -rf .tmp_unzip

          git checkout -B release
          git add -A --force
          git commit -m "Release build ${TAG} from ${GITHUB_SHA}"

          git push origin release --force
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Wait for tag propagation
        run: sleep 5

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check.outputs.tag }}
          generateReleaseNotes: true
          prerelease: ${{ needs.check.outputs.prerelease == 'true' }}
          artifacts: .build/scheduled-page-reviews-*.zip
