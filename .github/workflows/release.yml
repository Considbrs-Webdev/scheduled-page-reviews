name: Release

on:
  # Triggas när du publicerar en release via GitHubs gränssnitt
  release:
    types: [published]
  # Gör att du kan trigga flödet manuellt från Actions-fliken
  workflow_dispatch:
    inputs:
      version:
        description: 'Versionsnummer (t.ex. v0.1.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Vi bygger alltid utifrån stabila main
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies and verify
        run: |
          composer install --optimize-autoloader
          npm ci
          composer test
          npm run typecheck
          npm run build

      - name: Build release ZIP
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
        run: node scripts/build-release.mjs

      - name: Upload release ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-page-reviews-${{ github.event.inputs.version || github.event.release.tag_name }}
          path: .build/scheduled-page-reviews-*.zip

      - name: Prepare production assets for Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Hämta rätt version dynamiskt
          VERSION=${{ github.event.inputs.version || github.event.release.tag_name }}

          # Packa upp den rena produktions-ZIP:en direkt i mappen (så vi slipper node_modules etc.)
          mkdir -p .tmp_unzip
          unzip -q .build/scheduled-page-reviews-*.zip -d .tmp_unzip
          
          # Töm arbetskatalogen utom .git och .build, flytta sedan in produktionsfilerna
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.build' ! -name '.tmp_unzip' -exec rm -rf {} +
          cp -r .tmp_unzip/scheduled-page-reviews/* .
          rm -rf .tmp_unzip

          # Tvinga Git att indexera ALLA filer (inklusive de som normalt är i .gitignore, t.ex. dist)
          git add -A --force
          git commit -m "Build: Production assets for $VERSION"
          
          # Skapa/skriv över taggen med den byggda koden och force-pusha till GitHub
          git tag -f $VERSION
          git push origin $VERSION --force

      # Uppdaterar GitHub-releasen med den färdiga ZIP-filen (om flödet startades från en Release)
      - name: Update GitHub Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: .build/scheduled-page-reviews-*.zip
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
