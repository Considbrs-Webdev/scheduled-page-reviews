name: Release

on:
  # Triggas när du skapar en release i GitHubs gränssnitt, ELLER manuellt
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versionsnummer (t.ex. v0.1.2)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Vi bygger utifrån main-branchen
          fetch-depth: 0

      # ... (Här ligger dina vanliga steg: setup-php, setup-node, npm run build) ...

      - name: Commit built assets and CREATE NEW Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Sätt versionsnummer baserat på om det är en release eller manuell körning
          VERSION=${{ github.event.inputs.version || github.event.release.tag_name }}

          # Unpacka zip eller lägg till filer direkt
          git add -A --force
          git commit -m "Build: Production assets for $VERSION"
          
          # Skapa en HELT NY tagg på denna commit
          git tag $VERSION
          git push origin $VERSION
